<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not a date — 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:       #D4537E;
      --pink-light: #FBEAF0;
      --pink-mid:   #ED93B1;
      --pink-dark:  #993556;
      --pink-deep:  #4B1528;
      --text:       #1a1018;
      --muted:      #7a6472;
      --hint:       #b3a4ac;
      --border:     rgba(180,120,150,0.18);
      --border-md:  rgba(180,120,150,0.32);
      --bg:         #fdf8f9;
      --card:       #fff;
      --radius:     10px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 1.25rem 4rem;
      background-image:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(212,83,126,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 10% 90%, rgba(212,83,126,0.05) 0%, transparent 70%);
    }

    .card {
      background: var(--card);
      border: 0.5px solid var(--border-md);
      border-radius: 20px;
      padding: 2.5rem 2rem 2.25rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 2px 40px rgba(180,80,120,0.07);
      animation: rise 0.5s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 1.75rem; }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 10px;
      font-weight: 500;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 400;
      font-style: italic;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.65;
    }

    .divider {
      height: 0.5px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* ── Section labels ── */
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--hint);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-label svg { width: 14px; height: 14px; stroke: var(--hint); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Week labels ── */
    .week-tag {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pink-mid);
      margin-bottom: 7px;
    }

    .weeks-gap { height: 16px; }

    /* ── Day grid ── */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 4px;
    }

    .day-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 9px 2px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius);
      background: var(--card);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
      position: relative;
      outline: none;
    }

    .day-btn:hover:not(.past) {
      border-color: var(--pink);
      background: var(--pink-light);
      transform: translateY(-1px);
    }

    .day-btn.selected {
      background: var(--pink-light);
      border: 1.5px solid var(--pink);
    }

    .day-btn.today { border-color: var(--pink-mid); }
    .day-btn.today .day-short { color: var(--pink); }

    .day-btn.past {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    .day-short {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--hint);
    }

    .day-btn.selected .day-short { color: var(--pink-dark); }

    .day-num {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .day-btn.selected .day-num { color: var(--pink-deep); }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--pink);
      position: absolute;
      top: 5px;
      right: 5px;
      opacity: 0;
      transition: opacity 0.18s;
    }

    .day-btn.selected .dot { opacity: 1; }

    /* ── Time slots ── */
    .time-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1.75rem;
    }

    .time-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 11px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius);
      background: var(--card);
      cursor: pointer;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
      outline: none;
    }

    .time-btn svg { width: 15px; height: 15px; stroke: var(--hint); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; transition: stroke 0.15s; }

    .time-btn:hover {
      border-color: var(--pink);
      background: var(--pink-light);
      transform: translateY(-1px);
    }

    .time-btn.selected {
      background: var(--pink-light);
      border: 1.5px solid var(--pink);
      color: var(--pink-deep);
    }

    .time-btn.selected svg { stroke: var(--pink); }

    /* ── Note ── */
    .note-wrap { margin-bottom: 1.75rem; }

    textarea {
      width: 100%;
      height: 70px;
      resize: none;
      font-size: 13.5px;
      font-family: 'DM Sans', sans-serif;
      padding: 10px 13px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      outline: none;
      transition: border-color 0.18s;
      line-height: 1.55;
    }

    textarea:focus { border-color: var(--pink); }
    textarea::placeholder { color: var(--hint); font-style: italic; }

    /* ── Nope button ── */
    .nope-btn {
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      color: var(--hint);
      background: none;
      border: 0.5px dashed var(--border-md);
      border-radius: var(--radius);
      padding: 9px 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: left 0.15s ease, top 0.15s ease;
      z-index: 9999;
    }

    .nope-btn:hover { color: var(--muted); }

    /* ── Submit ── */
    .submit-row { display: flex; justify-content: flex-end; }

    .submit-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 26px;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s;
      letter-spacing: 0.02em;
    }

    .submit-btn:hover { background: var(--pink-dark); }
    .submit-btn:active { transform: scale(0.97); }

    .submit-btn svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Success ── */
    .success-state {
      display: none;
      text-align: center;
      padding: 2rem 1rem 1rem;
      animation: rise 0.45s ease both;
    }

    .cup-icon {
      font-size: 48px;
      margin-bottom: 1rem;
      animation: steam 2s ease-in-out infinite;
    }

    @keyframes steam {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    .success-state h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 400;
      font-style: italic;
      margin-bottom: 8px;
      color: var(--text);
    }

    .success-state p {
      font-size: 15px;
      color: var(--muted);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      margin-bottom: 1.25rem;
    }

    .success-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      background: var(--pink-light);
      border-radius: 50px;
      font-size: 13px;
      color: var(--pink-deep);
      border: 0.5px solid var(--pink-mid);
      font-weight: 500;
    }

    .success-pill svg { width: 14px; height: 14px; stroke: var(--pink); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Footer ── */
    .page-footer {
      margin-top: 1.75rem;
      font-size: 12px;
      color: var(--hint);
      text-align: center;
      letter-spacing: 0.03em;
    }

    @media (max-width: 480px) {
      body { padding: 1.5rem 0.75rem 3rem; }
      .card { padding: 1.75rem 1.25rem 1.75rem; border-radius: 16px; }
      .title { font-size: 26px; }
      .day-num { font-size: 13px; }
      .time-btn { font-size: 12px; padding: 9px 8px; gap: 5px; }
    }
  </style>
</head>
<body>

  <div class="card" id="card">

    <!-- Form state -->
    <div id="form-state">
      <div class="header">
        <p class="subtitle" style="margin-bottom: 8px;">M'Lady it's time for</p>
        <div class="title">Not a date — 2</div>
        <p class="subtitle">aur bhi bohot saari stories baaki hai 😂</p>
      </div>

      <div class="divider"></div>

      <!-- Day picker -->
      <div style="margin-bottom: 1.5rem;">
        <div class="section-label">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Pick a day
        </div>
        <div class="days-grid" id="this-week-grid"></div>
      </div>

      <div class="divider"></div>

      <!-- Time picker -->
      <div class="section-label" style="margin-bottom: 10px;">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        What time?
      </div>
      <div class="time-slots">
        <button class="time-btn" data-time="11 AM" onclick="selectTime(this)">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          11 AM
        </button>
        <button class="time-btn" data-time="Afternoon" onclick="selectTime(this)">
          <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
          Afternoon
        </button>
        <button class="time-btn" data-time="Evening" onclick="selectTime(this)">
          <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          Evening
        </button>
        <button class="time-btn" data-time="9 AM" onclick="selectTime(this)">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          9 AM
        </button>
        <button class="time-btn" data-time="12 PM" onclick="selectTime(this)">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          12 PM
        </button>
        <button class="time-btn" data-time="3 PM" onclick="selectTime(this)">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          3 PM
        </button>
      </div>

      <div class="divider"></div>

      <!-- Note -->
      <div class="note-wrap">
        <div class="section-label" style="margin-bottom: 9px;">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          A little note (optional)
        </div>
        <textarea id="note-input" placeholder="e.g. I like oat lattes, just so you know…"></textarea>
      </div>

      <div class="submit-row">
        <button class="submit-btn" onclick="handleSubmit()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Send it
        </button>
      </div>
    </div>

    <!-- Success state -->
    <div class="success-state" id="success-state">
      <div class="cup-icon">☕</div>
      <h2>Can't wait</h2>
      <p>See you then M'Lady</p>
      <div class="success-pill" id="success-detail"></div>
    </div>

  </div>

  <div class="page-footer">12 days to go 🥺</div>

  <button class="nope-btn" id="nope-btn">ye week nahi ho paayega</button>

  <script>
    let selectedDay = null;
    let selectedTime = null;

    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const today = new Date();
    today.setHours(0,0,0,0);

    function buildGrid(containerId, startDate) {
      const grid = document.getElementById(containerId);
      for (let i = 0; i < 7; i++) {
        const d = new Date(startDate);
        d.setDate(startDate.getDate() + i);
        const isPast = d < today;
        const isToday = d.getTime() === today.getTime();
        const label = dayNames[d.getDay()];
        const num = d.getDate();
        const fullLabel = label + ' ' + num;

        const btn = document.createElement('button');
        btn.className = 'day-btn' + (isPast ? ' past' : '') + (isToday ? ' today' : '');
        btn.dataset.day = fullLabel;
        btn.innerHTML = `<span class="day-short">${label}</span><span class="day-num">${num}</span><span class="dot"></span>`;
        if (!isPast) btn.onclick = function() { selectDay(this); };
        grid.appendChild(btn);
      }
    }

    const dow = today.getDay();
    const diffToMon = (dow === 0 ? -6 : 1 - dow);
    const thisMonday = new Date(today);
    thisMonday.setDate(today.getDate() + diffToMon);
    buildGrid('this-week-grid', thisMonday);

    function selectDay(btn) {
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedDay = btn.dataset.day;
    }

    function selectTime(btn) {
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTime = btn.dataset.time;
    }

    function handleSubmit() {
      if (!selectedDay || !selectedTime) {
        const el = document.querySelector(!selectedDay ? '#this-week-grid' : '.time-slots');
        el.style.transition = 'opacity 0.1s';
        el.style.opacity = '0.35';
        setTimeout(() => el.style.opacity = '1', 320);
        return;
      }
      const note = document.getElementById('note-input').value.trim();
      const detail = document.getElementById('success-detail');
      detail.innerHTML = `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#D4537E;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${selectedDay} &nbsp;·&nbsp; ${selectedTime}${note ? ' &nbsp;·&nbsp; "' + note + '"' : ''}`;
      document.getElementById('form-state').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';
    }

    // Runaway nope button — starts bottom right, runs when cursor gets close
    const nopeBtn = document.getElementById('nope-btn');
    const MARGIN = 20;
    const TRIGGER = 110;
    let hasRun = false;

    function setPos(x, y) {
      nopeBtn.style.left = x + 'px';
      nopeBtn.style.top  = y + 'px';
    }

    function runAway() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const bw = nopeBtn.offsetWidth || 200;
      const bh = nopeBtn.offsetHeight || 38;
      // Pick a random spot that isn't the bottom-right quadrant to feel like it fled
      let x, y, attempts = 0;
      do {
        x = MARGIN + Math.random() * Math.max(0, vw - bw - MARGIN * 2);
        y = MARGIN + Math.random() * Math.max(0, vh - bh - MARGIN * 2);
        attempts++;
      } while (attempts < 10 && x > vw * 0.55 && y > vh * 0.55);
      setPos(x, y);
    }

    // Place at bottom right initially
    setTimeout(function() {
      nopeBtn.style.position = 'fixed';
      nopeBtn.style.transition = 'left 0.18s ease, top 0.18s ease';
      const bw = nopeBtn.offsetWidth || 200;
      const bh = nopeBtn.offsetHeight || 38;
      setPos(window.innerWidth - bw - MARGIN, window.innerHeight - bh - MARGIN);
    }, 100);

    document.addEventListener('mousemove', function(e) {
      const rect = nopeBtn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top  + rect.height / 2;
      if (Math.hypot(e.clientX - cx, e.clientY - cy) < TRIGGER) runAway();
    });

    document.addEventListener('touchstart', function(e) {
      const t = e.touches[0];
      const rect = nopeBtn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top  + rect.height / 2;
      if (Math.hypot(t.clientX - cx, t.clientY - cy) < TRIGGER + 20) runAway();
    }, { passive: true });

  </script>
</body>
</html>
